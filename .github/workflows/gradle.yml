name: Verifying Everything Compiles

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build with wrapper
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v5

      - run: chmod +x gradlew

      - name: Run tests and build
        run: ./gradlew test build --stacktrace

  compatibility:
    name: Gradle ${{ matrix.gradle }} on ${{ matrix.os }} with Java ${{ matrix.java }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gradle: "9.4.0"
            java: "25"
          - os: windows-latest
            gradle: "9.4.0"
            java: "25"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: ${{ matrix.gradle }}
      - name: Make wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew
      - name: Run compatibility checks
        run: gradle test pluginUnderTestMetadata --stacktrace --info